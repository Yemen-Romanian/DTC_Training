[training_params]
    batch_size = 16
    lr = 0.001
    epochs_num = 20
    evaluation_interval = 3

[model]
    id = "siamfc"
    [model.backbone]
        type = "AlexNet" # Options: "AlexNet", "MobileNetV3"
        freeze = false
    [model.params]
        device = "cuda"

[train_path]
    synthetic = ""
    uav123 = ""
    manual = ""

[val_path]
    synthetic = ""
    uav123 = ""
    manual = ""

# Optional: evaluated once at the end of training. Remove section to skip final evaluation.
# [test_path]
#     synthetic = ""
#     uav123 = ""
